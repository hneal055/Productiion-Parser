version: "3.9"

services:
  contract-review:
    build:
      context: ./contract-review-tool
    image: production-parser/contract-review:latest
    container_name: contract-review
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    env_file:
      - ./contract-review-tool/.env
    volumes:
      - contract_review_uploads:/app/uploads
      - contract_review_db:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  budget-parser:
    build:
      context: ./production-budget-parser
    image: production-parser/budget-parser:latest
    container_name: budget-parser
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8082"
    env_file:
      - ./production-budget-parser/.env
    volumes:
      - budget_uploads:/app/uploads
      - budget_outputs:/app/outputs
      - budget_db:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  screenflow-aura:
    build:
      context: ./screenflow-aura
    image: production-parser/screenflow-aura:latest
    container_name: screenflow-aura
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:8083"
    env_file:
      - ./screenflow-aura/.env
    volumes:
      - aura_db:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  contract_review_uploads:
  contract_review_db:
  budget_uploads:
  budget_outputs:
  budget_db:
  aura_db:
