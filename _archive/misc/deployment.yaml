apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-dashboard
  labels:
    app: aura-dashboard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aura-dashboard
  template:
    metadata:
      labels:
        app: aura-dashboard
    spec:
      containers:
      - name: aura-dashboard
        image: aura-dashboard:latest
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aura-dashboard-service
spec:
  selector:
    app: aura-dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer