version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_DB: aura_dashboard
      POSTGRES_USER: aura_admin
      POSTGRES_PASSWORD: AuraDB2024!
    ports:
      - "5432:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql
    networks:
      - aura-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aura-backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=aura_dashboard
      - DB_USER=aura_admin
      - DB_PASSWORD=AuraDB2024!
      - JWT_SECRET_KEY=aura-jwt-super-secret-2024
      - SECRET_KEY=aura-flask-secret-2024
      - FLASK_CONFIG=production
    depends_on:
      - postgres
    networks:
      - aura-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aura-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - aura-network

networks:
  aura-network:
    driver: bridge