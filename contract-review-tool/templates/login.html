<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AURA Enterprise</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="gradient-bg inline-flex items-center justify-center w-16 h-16 rounded-full mb-4">
                <i class="fas fa-film text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">AURA Enterprise</h1>
            <p class="text-gray-500 mt-1">Scene Reader Studio Technologies</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h2 class="text-xl font-semibold text-gray-700 mb-6 text-center">Sign In</h2>

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-5 flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600 mb-2" for="username">
                        <i class="fas fa-user mr-1"></i> Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
                        placeholder="Enter username"
                        autofocus
                        required
                    >
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-600 mb-2" for="password">
                        <i class="fas fa-lock mr-1"></i> Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
                        placeholder="Enter password"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="w-full gradient-bg text-white font-semibold py-3 rounded-lg hover:opacity-90 transition duration-200 flex items-center justify-center"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i> Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-gray-400 text-sm mt-6">
            &copy; 2024 Scene Reader Studio Technologies LLC
        </p>
    </div>
</body>
</html>
